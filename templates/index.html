<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Job Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .job-card { transition: transform 0.2s; border-radius: 12px; }
        .job-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .badge-exp { background-color: #e9ecef; color: #495057; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="mb-4 text-center">🚀 Software Jobs (Last 24h)</h1>
        <p class="text-center text-muted mb-5">Germany, Netherlands, & Luxembourg</p>

        <div class="row">
            {% for job in jobs %}
            <div class="col-md-6 mb-4">
                <div class="card h-100 job-card border-0 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary">{{ job.title }}</h5>
                        <div class="mb-2">
                            <span class="badge badge-exp p-2">⏳ {{ job.experience }}</span>
                        </div>
                        <p class="card-text text-muted small">
                            {{ job.snippet[:150] }}...
                        </p>
                        <a href="{{ job.link }}" target="_blank" class="btn btn-outline-primary btn-sm">View on LinkedIn</a>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12 text-center">
                <p>No jobs found yet. Try running the scraper!</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
